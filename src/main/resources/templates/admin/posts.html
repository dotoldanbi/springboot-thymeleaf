<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spring Boot Admin Posts Thymeleaf</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>

  <div th:replace="admin/header :: header"></div>
  <body>
    <div th:replace="admin/header :: navbar"></div>

    <div class="container">
      <div class="row"><h1>List Blog Posts</h1></div>
    </div>
    <table class="table table-striped table-hover table-bordered">
      <thead class="table-dark">
        <th style="width: 10%">#</th>
        <th style="width: 20%">Post Title</th>
        <th style="width: 30%">Post Short Description</th>
        <th style="width: 20%">Post Created On</th>
        <th style="width: 20%">Actions</th>
      </thead>
      <tbody>
        <tr th:each="post, postStat : ${posts}">
          <td th:text="${postStat.count}">1</td>
          <td th:text="${post.title}">Post Title</td>
          <td th:text="${post.shortDescription}">Post Short Description</td>
          <td th:text="${post.createdOn}">Post Created On</td>
          <td>
            <a
              th:href="@{'/admin/posts/' + ${post.id}}"
              class="btn btn-primary btn-sm"
              >Edit</a
            >
            <a
              th:href="@{'/admin/posts/delete/' + ${post.id}}"
              class="btn btn-danger btn-sm"
              >Delete</a
            >
          </td>
        </tr>
      </tbody>
    </table>
    <div th:replace="admin/footer :: footer"></div>
  </body>
</html>
